name: Build desktop installers

# Builds double-click installers on real Windows + macOS runners:
#   - Windows: DET Practice Setup <version>.exe   (NSIS one-click installer)
#   - macOS:   DET Practice-<version>.dmg          (drag-to-Applications)
#
# Run it from the GitHub "Actions" tab (Run workflow), or push a tag like
# v1.0.0 to also publish the installers to a GitHub Release.

on:
  workflow_dispatch:
  push:
    tags: ['v*']

# allow the release step to create/update GitHub Releases
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        env:
          # build unsigned (no Apple/Windows code-signing certificate needed)
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DET-Practice-${{ matrix.name }}
          if-no-files-found: ignore
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage

      - name: Publish to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
